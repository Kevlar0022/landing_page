<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Join the Waitlist</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<!-- Performance -->
<link rel="preconnect" href="https://challenges.cloudflare.com" crossorigin>
<link rel="preconnect" href="https://kevin-satti.kit.com" crossorigin>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#0b1220;
  color:#fff;
}

/* layout */

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:100vh;
}

/* left side */

.left{
  background:
  radial-gradient(circle at 30% 20%,rgba(80,140,255,.3),transparent 40%),
  radial-gradient(circle at 70% 70%,rgba(80,200,255,.2),transparent 45%),
  #0b1220;

  padding:60px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.left h1{
  font-size:48px;
  line-height:1.1;
  margin-bottom:20px;
}

.left p{
  font-size:18px;
  color:#cbd5f5;
  max-width:440px;
}

/* right side */

.right{
  background:#fff;
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px;
}

.form-box{
  width:100%;
  max-width:420px;
}

.form-box h2{
  margin-bottom:10px;
}

input[type=email]{
  width:100%;
  padding:14px;
  font-size:16px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:14px;
  border-radius:8px;
  border:none;
  background:#2563eb;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

.status{
  margin-top:10px;
  font-size:14px;
}

/* mobile */

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

.left{
padding:40px;
text-align:center;
}

}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->

<div class="left">

<h1>Something exciting is coming.</h1>

<p>
Join the waitlist to get early access and updates when we launch.
</p>

</div>

<!-- RIGHT -->

<div class="right">

<div class="form-box">

<h2>Join the waitlist</h2>

<form id="signup">

<input
type="email"
name="email"
placeholder="you@example.com"
required
/>

<div
class="cf-turnstile"
data-sitekey="0x4AAAAAACoBSDK8yi_V3vW6">
</div>

<button type="submit">
Join Waitlist
</button>

<div class="status" id="status"></div>

</form>

</div>

</div>

</div>

<script>

const form=document.getElementById("signup")
const status=document.getElementById("status")

form.addEventListener("submit",async(e)=>{

e.preventDefault()

const email=form.email.value.trim()

if(!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)){
status.textContent="Please enter a valid email"
return
}

const token=document.querySelector('[name="cf-turnstile-response"]').value

if(!token){
status.textContent="Please complete verification"
return
}

status.textContent="Submitting..."

try{

const res=await fetch("https://verify.sattikevin.workers.dev/",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
turnstileToken:token
})

})

if(res.ok){
status.textContent="You're on the list 🎉"
form.reset()
}else{
status.textContent="Something went wrong"
}

}catch(err){
status.textContent="Network error"
}

})

</script>

</body>
</html>
